# Render — Validation Engine (use when "engine" is the repo root)
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: spamguard-engine
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
